<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>部落格圖片處理工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC","Microsoft JhengHei",sans-serif;
  background:#f5f6f8;color:#404040;min-height:100vh;padding:0;
}

/* ── Header Bar ── */
.top-bar{
  background:linear-gradient(135deg,#5ec4a8 0%,#17BFAB 50%,#4dbba5 100%);
  padding:14px 24px;display:flex;align-items:center;justify-content:center;gap:10px;
}
.top-bar h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:.5px}
.top-bar .sub{font-size:13px;color:rgba(255,255,255,.8);font-weight:400}

/* ── Layout ── */
.container{max-width:860px;margin:0 auto;padding:28px 20px 40px}

/* ── Card ── */
.card{
  background:#fff;border-radius:16px;padding:28px;margin-bottom:20px;
  border:1px solid #ececec;transition:box-shadow .2s;
}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.05)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-size:16px;font-weight:700;color:#404040;display:flex;align-items:center;gap:8px}
.badge{
  font-size:11px;font-weight:600;padding:3px 10px;border-radius:8px;
  background:#E9F9F0;color:#17BFAB;
}
.badge-done{background:#E9F9F0;color:#15803d}

/* ── Upload Zone ── */
.upload-zone{
  border:2px dashed #d4d4d4;border-radius:16px;padding:52px 24px;
  text-align:center;cursor:pointer;transition:all .25s;background:#fafafa;
}
.upload-zone:hover,.upload-zone.dragover{border-color:#17BFAB;background:#E9F9F0}
.upload-icon{width:56px;height:56px;margin:0 auto 14px;background:#E9F9F0;border-radius:50%;display:flex;align-items:center;justify-content:center}
.upload-icon svg{width:26px;height:26px;stroke:#17BFAB;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.upload-zone p{color:#404040;font-size:15px;font-weight:500;margin-bottom:6px}
.upload-zone .hint{font-size:13px;color:#999;font-weight:400}
.upload-zone input{display:none}

/* ── Logo Row ── */
.logo-row{
  display:flex;align-items:center;gap:18px;padding:16px 18px;
  background:#fafafa;border-radius:12px;border:1px solid #ececec;
}
.logo-row img{width:76px;height:auto;object-fit:contain;border-radius:8px;border:1px solid #ececec;background:#fff;padding:6px}
.logo-row .placeholder{
  width:76px;height:44px;display:flex;align-items:center;justify-content:center;
  border:2px dashed #d4d4d4;border-radius:8px;font-size:12px;color:#bbb;background:#fff;
}
.logo-row .logo-info{flex:1;display:flex;flex-direction:column;gap:6px}
.logo-row .logo-status{font-size:12px;color:#999}
.logo-row input{display:none}

/* ── Info Bar ── */
.info-bar{
  display:flex;gap:24px;flex-wrap:wrap;font-size:13px;color:#636363;
  padding:12px 16px;background:#fafafa;border-radius:10px;margin-bottom:16px;
  border:1px solid #ececec;
}
.info-bar .item{display:flex;align-items:center;gap:6px}
.info-bar .label{color:#999;font-weight:500;font-size:12px}

/* ── Notice ── */
.notice{font-size:13px;padding:11px 16px;border-radius:10px;margin-bottom:16px;font-weight:500}
.notice-teal{background:#E9F9F0;color:#0e9a87}
.notice-amber{background:#fff8e6;color:#b45309;border:1px solid #fde68a}

/* ── Options ── */
.options-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.opt-group{flex:1;min-width:200px;display:flex;flex-direction:column;gap:6px}
.opt-group label{font-size:13px;font-weight:600;color:#404040}
.opt-group input[type=text],.opt-group select{
  padding:10px 14px;border:1px solid #d4d4d4;border-radius:10px;font-size:14px;
  outline:none;transition:all .2s;background:#fff;color:#404040;
}
.opt-group input[type=text]:focus,.opt-group select:focus{
  border-color:#17BFAB;box-shadow:0 0 0 3px rgba(23,191,171,.12);
}

/* ── Checkbox ── */
.chk-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.chk-row input[type=checkbox]{
  width:18px;height:18px;cursor:pointer;accent-color:#17BFAB;border-radius:4px;
}
.chk-row label{font-size:14px;cursor:pointer;color:#404040;font-weight:500}

/* ── Draggable Canvas ── */
.preview-wrap.can-drag{cursor:grab}
.preview-wrap.can-drag:active{cursor:grabbing}
.crop-hint{text-align:center;font-size:12px;color:#17BFAB;margin:8px 0 0;font-weight:500}

/* ── Preview ── */
.preview-wrap{text-align:center;position:relative}
.preview-wrap canvas{
  max-width:100%;border-radius:12px;border:1px solid #ececec;
  display:block;margin:0 auto;
}
.preview-info{
  display:flex;justify-content:center;gap:24px;margin-top:14px;
  font-size:13px;color:#636363;font-weight:500;
}
.preview-info .saved{color:#17BFAB;font-weight:700}
.preview-info .warn{color:#b45309;font-weight:700}

/* ── Buttons ── */
.btn{
  padding:10px 24px;border:none;border-radius:10px;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;
}
.btn-download{
  background:#F9D122;color:#404040;font-size:15px;padding:12px 32px;
  box-shadow:0 2px 8px rgba(249,209,34,.3);
}
.btn-download:hover{background:#f0c800;box-shadow:0 4px 12px rgba(249,209,34,.4)}
.btn-teal{background:#17BFAB;color:#fff}
.btn-teal:hover{background:#0ea998}
.btn-outline{background:#fff;color:#636363;border:1px solid #d4d4d4}
.btn-outline:hover{background:#fafafa;border-color:#bbb}
.btn-sm{padding:7px 16px;font-size:13px}
.btn-danger-text{background:none;border:none;color:#e74c3c;font-size:12px;cursor:pointer;padding:2px 8px;font-weight:500}
.btn-danger-text:hover{text-decoration:underline}
.actions{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}

/* ── Loading ── */
.processing-overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.88);border-radius:12px;font-size:15px;
  color:#17BFAB;font-weight:600;z-index:5;
}

/* ── Divider ── */
.divider{height:1px;background:#ececec;margin:18px 0}

/* ── Hidden ── */
.hidden{display:none!important}

/* ── Responsive ── */
@media(max-width:600px){
  .container{padding:16px 12px 32px}
  .card{padding:20px 16px}
  .options-row{flex-direction:column}
  .opt-group{min-width:0}
  .top-bar h1{font-size:16px}
}
</style>
</head>
<body>

<!-- Header -->
<div class="top-bar">
  <h1>部落格圖片處理工具</h1>
  <span class="sub">Blog Image Tool</span>
</div>

<div class="container">

  <!-- LOGO Setup -->
  <div class="card" id="logoCard">
    <div class="card-header">
      <div class="card-title">LOGO 設定</div>
      <span class="badge" id="logoBadge">未設定</span>
    </div>
    <div class="logo-row">
      <div id="logoThumb"><div class="placeholder">LOGO</div></div>
      <div class="logo-info">
        <div>
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('logoInput').click()">上傳 LOGO</button>
          <button class="btn-danger-text hidden" id="logoRemoveBtn" onclick="removeLogo()">移除</button>
        </div>
        <span class="logo-status" id="logoStatus">上傳 PNG 透明背景圖檔，僅需設定一次</span>
      </div>
      <input type="file" id="logoInput" accept="image/png,image/webp,image/gif" onchange="handleLogoUpload(this.files[0])">
    </div>
  </div>

  <!-- Upload -->
  <div class="card" id="uploadCard">
    <div class="card-header">
      <div class="card-title">上傳圖片</div>
    </div>
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <p>拖曳圖片到此處，或點擊選擇檔案</p>
      <p class="hint">支援 PNG / JPEG / WebP，也可以 Ctrl+V 貼上</p>
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">
    </div>
  </div>

  <!-- Options -->
  <div class="card hidden" id="optionsCard">
    <div class="card-header">
      <div class="card-title">處理選項</div>
    </div>

    <div class="info-bar" id="origInfo">
      <div class="item"><span class="label">尺寸</span><span id="origDim"></span></div>
      <div class="item"><span class="label">大小</span><span id="origSize"></span></div>
      <div class="item"><span class="label">格式</span><span id="origFmt"></span></div>
    </div>

    <div id="resizeNotice" class="notice notice-teal"></div>

    <div class="divider"></div>

    <div class="chk-row">
      <input type="checkbox" id="chkSharpen" checked onchange="onOptChange()">
      <label for="chkSharpen">縮圖銳化（讓縮放後的圖片更清晰）</label>
    </div>

    <div class="chk-row">
      <input type="checkbox" id="chkLogo" onchange="onOptChange()">
      <label for="chkLogo">加入公司 LOGO（置中）</label>
    </div>

    <div class="divider"></div>

    <div class="options-row">
      <div class="opt-group">
        <label for="txtName">檔案名稱</label>
        <input type="text" id="txtName" placeholder="輸入檔案名稱">
      </div>
      <div class="opt-group">
        <label for="selFmt">輸出格式</label>
        <select id="selFmt" onchange="onOptChange()">
          <option value="original">保持原格式</option>
          <option value="image/webp">WebP</option>
          <option value="image/jpeg">JPEG</option>
          <option value="image/png">PNG</option>
        </select>
      </div>
    </div>

    <div id="pngWarn" class="notice notice-amber hidden">PNG 為無損格式，無法透過降低品質來壓縮檔案大小。若超過 150KB，建議選擇 WebP 或 JPEG。</div>
  </div>

  <!-- Preview -->
  <div class="card hidden" id="previewCard">
    <div class="card-header">
      <div class="card-title">預覽結果</div>
    </div>
    <div class="preview-wrap" id="previewWrap">
      <canvas id="cvs"></canvas>
      <div class="processing-overlay hidden" id="loadingOverlay">處理中...</div>
    </div>
    <p class="crop-hint hidden" id="cropHint"></p>
    <div class="preview-info" id="previewInfo">
      <span>尺寸：<span id="pvDim"></span></span>
      <span>大小：<span id="pvSize"></span></span>
      <span id="pvSaved"></span>
    </div>
    <div class="actions">
      <button class="btn btn-download" id="dlBtn" onclick="download()">下載圖片</button>
      <button class="btn btn-outline" onclick="reset()">處理另一張</button>
    </div>
  </div>

</div>

<script>
/* ───── State ───── */
let srcImg = null;
let srcFile = null;
let logoImg = null;
let cropOff = 0.5;
let outBlob = null;
let busy = false;
let debounce = null;

const TARGET_W = 800, TARGET_H = 450;
const MAX_BYTES = 150 * 1024;

/* ───── Init ───── */
document.addEventListener('DOMContentLoaded', () => {
  loadLogo();
  initUpload();
  initPaste();
});

/* ───── Logo ───── */
function loadLogo() {
  const d = localStorage.getItem('_blog_logo');
  if (!d) return;
  const img = new Image();
  img.onload = () => { logoImg = img; refreshLogoUI(); };
  img.src = d;
}

function handleLogoUpload(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    localStorage.setItem('_blog_logo', e.target.result);
    const img = new Image();
    img.onload = () => { logoImg = img; refreshLogoUI(); if (srcImg) scheduleUpdate(); };
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}

function removeLogo() {
  localStorage.removeItem('_blog_logo');
  logoImg = null;
  refreshLogoUI();
  document.getElementById('chkLogo').checked = false;
  if (srcImg) scheduleUpdate();
}

function refreshLogoUI() {
  const thumb = document.getElementById('logoThumb');
  const badge = document.getElementById('logoBadge');
  const rmBtn = document.getElementById('logoRemoveBtn');
  const status = document.getElementById('logoStatus');
  if (logoImg) {
    thumb.innerHTML = '<img src="' + logoImg.src + '" alt="LOGO">';
    badge.textContent = '已設定';
    badge.className = 'badge badge-done';
    rmBtn.classList.remove('hidden');
    status.textContent = '已儲存於瀏覽器，下次開啟自動載入';
  } else {
    thumb.innerHTML = '<div class="placeholder">LOGO</div>';
    badge.textContent = '未設定';
    badge.className = 'badge';
    rmBtn.classList.add('hidden');
    status.textContent = '上傳 PNG 透明背景圖檔，僅需設定一次';
  }
}

/* ───── Upload ───── */
function initUpload() {
  const zone = document.getElementById('uploadZone');
  const inp = document.getElementById('fileInput');
  zone.addEventListener('click', () => inp.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadFile(f);
  });
  inp.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
}

function initPaste() {
  document.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const it of items) {
      if (it.type.startsWith('image/')) {
        e.preventDefault();
        const f = it.getAsFile();
        if (f) loadFile(f);
        return;
      }
    }
  });
}

function loadFile(file) {
  srcFile = file;
  const r = new FileReader();
  r.onload = e => {
    const img = new Image();
    img.onload = () => { srcImg = img; showOptions(); scheduleUpdate(); };
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}

/* ───── Options UI ───── */
function showOptions() {
  const w = srcImg.naturalWidth, h = srcImg.naturalHeight;

  document.getElementById('origDim').textContent = w + ' x ' + h + ' px';
  document.getElementById('origSize').textContent = fmtSize(srcFile.size);
  document.getElementById('origFmt').textContent = srcFile.type.split('/')[1].toUpperCase();

  const raw = srcFile.name ? srcFile.name.replace(/\.[^.]+$/, '') : 'image_' + Date.now();
  document.getElementById('txtName').value = raw;

  const notice = document.getElementById('resizeNotice');

  if (w >= TARGET_W) {
    notice.textContent = '原圖 ' + w + ' x ' + h + ' → 等比縮放填滿 ' + TARGET_W + ' x ' + TARGET_H;
    const targetR = TARGET_W / TARGET_H;
    const imgR = w / h;
    if (Math.abs(imgR - targetR) < 0.02) {
      needsCrop = false;
    } else {
      needsCrop = true;
      cropOff = 0.5;
      cropDir = imgR > targetR ? 'x' : 'y';
      document.getElementById('cropHint').textContent =
        cropDir === 'x' ? '← 拖曳預覽圖片調整水平位置 →' : '↑ 拖曳預覽圖片調整垂直位置 ↓';
    }
  } else {
    notice.textContent = '原圖寬度 ' + w + 'px < ' + TARGET_W + 'px，僅壓縮不縮放';
    needsCrop = false;
  }

  document.getElementById('optionsCard').classList.remove('hidden');
}

/* ───── Canvas Drag (crop) ───── */
let isDragging = false;
let dragStart = 0;
let dragStartOff = 0;
let needsCrop = false;
let cropDir = null;

function setupCanvasDrag() {
  const wrap = document.getElementById('previewWrap');
  wrap.onmousedown = canvasDragStart;
  wrap.ontouchstart = canvasDragStart;
}

function canvasDragStart(e) {
  if (!needsCrop) return;
  e.preventDefault();
  isDragging = true;
  const p = ptrPos(e);
  dragStart = cropDir === 'y' ? p.y : p.x;
  dragStartOff = cropOff;
  document.addEventListener('mousemove', canvasDragMove);
  document.addEventListener('mouseup', canvasDragEnd);
  document.addEventListener('touchmove', canvasDragMove, {passive:false});
  document.addEventListener('touchend', canvasDragEnd);
}

function canvasDragMove(e) {
  if (!isDragging) return;
  e.preventDefault();
  const p = ptrPos(e);
  const cur = cropDir === 'y' ? p.y : p.x;
  const cvs = document.getElementById('cvs');
  const visibleSize = cropDir === 'y' ? cvs.getBoundingClientRect().height : cvs.getBoundingClientRect().width;
  const delta = dragStart - cur;
  cropOff = Math.max(0, Math.min(1, dragStartOff + delta / visibleSize));
  drawCanvas();
  dragStart = cur;
  dragStartOff = cropOff;
}

function canvasDragEnd() {
  isDragging = false;
  document.removeEventListener('mousemove', canvasDragMove);
  document.removeEventListener('mouseup', canvasDragEnd);
  document.removeEventListener('touchmove', canvasDragMove);
  document.removeEventListener('touchend', canvasDragEnd);
  scheduleUpdate();
}

function ptrPos(e) {
  if (e.touches && e.touches.length) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
  return {x:e.clientX, y:e.clientY};
}

/* ───── Events ───── */
function onOptChange() {
  if (document.getElementById('chkLogo').checked && !logoImg) {
    alert('請先在上方「LOGO 設定」上傳 LOGO 圖檔');
    document.getElementById('chkLogo').checked = false;
    return;
  }
  const fmt = document.getElementById('selFmt').value;
  document.getElementById('pngWarn').classList.toggle('hidden', fmt !== 'image/png');
  scheduleUpdate();
}

function scheduleUpdate() {
  clearTimeout(debounce);
  debounce = setTimeout(render, 80);
}

/* ───── Drawing (fast, for drag) ───── */
function drawCanvas() {
  if (!srcImg) return;
  const cvs = document.getElementById('cvs');
  const ctx = cvs.getContext('2d');
  const w = srcImg.naturalWidth, h = srcImg.naturalHeight;

  if (w >= TARGET_W) {
    cvs.width = TARGET_W;
    cvs.height = TARGET_H;
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    const tR = TARGET_W / TARGET_H;
    const iR = w / h;
    let sx, sy, sw, sh;
    if (iR > tR) {
      sh = h; sw = h * tR; sy = 0; sx = (w - sw) * cropOff;
    } else {
      sw = w; sh = w / tR; sx = 0; sy = (h - sh) * cropOff;
    }
    ctx.drawImage(srcImg, sx, sy, sw, sh, 0, 0, TARGET_W, TARGET_H);
  } else {
    cvs.width = w; cvs.height = h;
    ctx.drawImage(srcImg, 0, 0);
  }

  if (document.getElementById('chkSharpen').checked && w >= TARGET_W) {
    applySharpen(ctx, cvs.width, cvs.height, 0.4);
  }

  if (document.getElementById('chkLogo').checked && logoImg) {
    const lw = logoImg.naturalWidth, lh = logoImg.naturalHeight;
    const sc = Math.min(cvs.width / lw, cvs.height / lh);
    const dw = lw * sc, dh = lh * sc;
    ctx.drawImage(logoImg, (cvs.width - dw) / 2, (cvs.height - dh) / 2, dw, dh);
  }
}

/* ───── Full render (draw + compress) ───── */
async function render() {
  if (!srcImg || busy) return;
  busy = true;

  const previewCard = document.getElementById('previewCard');
  const wrap = document.getElementById('previewWrap');
  previewCard.classList.remove('hidden');
  wrap.classList.toggle('can-drag', needsCrop);
  document.getElementById('cropHint').classList.toggle('hidden', !needsCrop);

  drawCanvas();
  setupCanvasDrag();

  try {
    const cvs = document.getElementById('cvs');
    const fmt = getFormat();
    outBlob = await compress(cvs, fmt);

    document.getElementById('pvDim').textContent = cvs.width + ' x ' + cvs.height + ' px';
    document.getElementById('pvSize').textContent = fmtSize(outBlob.size);

    const pct = ((1 - outBlob.size / srcFile.size) * 100);
    const savedEl = document.getElementById('pvSaved');
    if (pct > 0) {
      savedEl.textContent = '節省 ' + pct.toFixed(0) + '%';
      savedEl.className = 'saved';
    } else {
      savedEl.textContent = '大小增加 ' + Math.abs(pct).toFixed(0) + '%';
      savedEl.className = 'warn';
    }
  } finally {
    busy = false;
  }
}

/* ───── Sharpen ───── */
function applySharpen(ctx, w, h, strength) {
  const src = ctx.getImageData(0, 0, w, h);
  const dst = ctx.createImageData(w, h);
  const s = src.data, d = dst.data;

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;

      if (y === 0 || y === h - 1 || x === 0 || x === w - 1) {
        d[i] = s[i]; d[i+1] = s[i+1]; d[i+2] = s[i+2]; d[i+3] = s[i+3];
        continue;
      }

      for (let c = 0; c < 3; c++) {
        const center = s[i + c];
        const neighbors =
          s[((y-1)*w+x)*4+c] +
          s[((y+1)*w+x)*4+c] +
          s[(y*w+x-1)*4+c] +
          s[(y*w+x+1)*4+c];
        const diff = center - neighbors / 4;
        const val = center + strength * diff;
        d[i + c] = val < 0 ? 0 : val > 255 ? 255 : (val + 0.5) | 0;
      }
      d[i+3] = s[i+3];
    }
  }

  ctx.putImageData(dst, 0, 0);
}

/* ───── Compression ───── */
function getFormat() {
  const sel = document.getElementById('selFmt').value;
  return sel === 'original' ? (srcFile.type || 'image/jpeg') : sel;
}

function getExt(fmt) {
  return { 'image/jpeg': '.jpg', 'image/png': '.png', 'image/webp': '.webp' }[fmt] || '.jpg';
}

async function compress(cvs, fmt) {
  if (fmt === 'image/png') return toBlobP(cvs, 'image/png');

  let blob = await toBlobP(cvs, fmt, 0.92);
  if (blob.size <= MAX_BYTES) return blob;

  let lo = 0.2, hi = 0.92, best = blob;
  for (let i = 0; i < 9; i++) {
    const mid = (lo + hi) / 2;
    blob = await toBlobP(cvs, fmt, mid);
    if (blob.size > MAX_BYTES) {
      hi = mid;
    } else {
      best = blob;
      lo = mid;
    }
  }
  return best.size <= MAX_BYTES ? best : blob;
}

function toBlobP(cvs, type, q) {
  return new Promise(res => cvs.toBlob(res, type, q));
}

/* ───── Download ───── */
function download() {
  if (!outBlob) return;
  const name = document.getElementById('txtName').value.trim() || 'image';
  const ext = getExt(getFormat());
  const url = URL.createObjectURL(outBlob);
  const a = document.createElement('a');
  a.href = url; a.download = name + ext;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ───── Reset ───── */
function reset() {
  srcImg = null; srcFile = null; outBlob = null; cropOff = 0.5;
  document.getElementById('optionsCard').classList.add('hidden');
  document.getElementById('previewCard').classList.add('hidden');
  needsCrop = false;
  document.getElementById('fileInput').value = '';
  document.getElementById('cropHint').classList.add('hidden');
  document.getElementById('previewWrap').classList.remove('can-drag');
  document.getElementById('chkSharpen').checked = true;
  document.getElementById('chkLogo').checked = false;
  document.getElementById('selFmt').value = 'original';
  document.getElementById('pngWarn').classList.add('hidden');
}

/* ───── Util ───── */
function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(2) + ' MB';
}
