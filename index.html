<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>部落格圖片處理工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei","Noto Sans TC",sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh;padding:24px}
.container{max-width:880px;margin:0 auto}
h1{text-align:center;font-size:22px;font-weight:700;margin-bottom:24px;color:#0f172a}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);border:1px solid #e2e8f0}
.card-title{font-size:15px;font-weight:600;margin-bottom:16px;color:#334155;display:flex;align-items:center;gap:8px}
.card-title .badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;background:#e0f2fe;color:#0369a1}

/* Upload */
.upload-zone{border:2px dashed #cbd5e1;border-radius:12px;padding:44px 24px;text-align:center;cursor:pointer;transition:all .2s;background:#f8fafc}
.upload-zone:hover,.upload-zone.dragover{border-color:#3b82f6;background:#eff6ff}
.upload-zone .icon{font-size:40px;margin-bottom:8px;color:#94a3b8;line-height:1}
.upload-zone p{color:#64748b;font-size:15px;margin-bottom:6px}
.upload-zone .hint{font-size:13px;color:#94a3b8}
.upload-zone input{display:none}

/* Info bar */
.info-bar{display:flex;gap:20px;flex-wrap:wrap;font-size:13px;color:#64748b;padding:10px 14px;background:#f1f5f9;border-radius:8px;margin-bottom:14px}
.info-bar .item{display:flex;align-items:center;gap:5px}
.info-bar .label{color:#94a3b8;font-weight:500}

/* Notice */
.notice{font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:14px}
.notice-blue{background:#eff6ff;color:#1d4ed8}
.notice-amber{background:#fffbeb;color:#b45309}

/* Options grid */
.options-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.opt-group{flex:1;min-width:200px;display:flex;flex-direction:column;gap:5px}
.opt-group label{font-size:13px;font-weight:500;color:#475569}
.opt-group input[type=text],.opt-group select{padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;background:#fff;color:#1e293b}
.opt-group input[type=text]:focus,.opt-group select:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}

/* Checkbox */
.chk-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.chk-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#3b82f6}
.chk-row label{font-size:14px;cursor:pointer;color:#475569}

/* Slider */
.slider-group{margin-bottom:14px}
.slider-group .slider-label{font-size:13px;font-weight:500;color:#475569;margin-bottom:6px;display:flex;justify-content:space-between}
.slider-group input[type=range]{width:100%;cursor:pointer;accent-color:#3b82f6}

/* Logo setup */
.logo-row{display:flex;align-items:center;gap:16px;padding:12px 14px;background:#f1f5f9;border-radius:8px}
.logo-row img{width:72px;height:auto;object-fit:contain;border-radius:4px;border:1px solid #e2e8f0;background:#fff;padding:4px}
.logo-row .placeholder{width:72px;height:40px;display:flex;align-items:center;justify-content:center;border:1px dashed #cbd5e1;border-radius:4px;font-size:12px;color:#94a3b8;background:#fff}
.logo-row .logo-info{flex:1;display:flex;flex-direction:column;gap:4px}
.logo-row .logo-status{font-size:12px;color:#94a3b8}
.logo-row input{display:none}

/* Preview */
.preview-wrap{text-align:center;position:relative}
.preview-wrap canvas{max-width:100%;border-radius:8px;border:1px solid #e2e8f0;display:block;margin:0 auto}
.preview-info{display:flex;justify-content:center;gap:20px;margin-top:10px;font-size:13px;color:#64748b}
.preview-info .saved{color:#16a34a;font-weight:600}

/* Buttons */
.btn{padding:9px 20px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#3b82f6;color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-primary:disabled{background:#93c5fd;cursor:not-allowed}
.btn-outline{background:#fff;color:#475569;border:1px solid #e2e8f0}
.btn-outline:hover{background:#f1f5f9}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-danger-text{background:none;border:none;color:#dc2626;font-size:12px;cursor:pointer;padding:2px 6px}
.btn-danger-text:hover{text-decoration:underline}
.actions{display:flex;gap:10px;justify-content:center;margin-top:16px}

/* Loading */
.processing-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.85);border-radius:8px;font-size:14px;color:#3b82f6;font-weight:500;z-index:5}

/* Hidden */
.hidden{display:none!important}

/* Responsive */
@media(max-width:600px){
  body{padding:12px}
  .options-row{flex-direction:column}
  .opt-group{min-width:0}
}
</style>
</head>
<body>
<div class="container">
  <h1>Blog Image Tool - 部落格圖片處理工具</h1>

  <!-- LOGO Setup -->
  <div class="card" id="logoCard">
    <div class="card-title">LOGO 設定 <span class="badge" id="logoBadge">未設定</span></div>
    <div class="logo-row">
      <div id="logoThumb"><div class="placeholder">LOGO</div></div>
      <div class="logo-info">
        <div>
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('logoInput').click()">上傳 LOGO</button>
          <button class="btn-danger-text hidden" id="logoRemoveBtn" onclick="removeLogo()">移除</button>
        </div>
        <span class="logo-status" id="logoStatus">上傳 PNG 透明背景圖檔，僅需設定一次</span>
      </div>
      <input type="file" id="logoInput" accept="image/png,image/webp,image/gif" onchange="handleLogoUpload(this.files[0])">
    </div>
  </div>

  <!-- Upload -->
  <div class="card" id="uploadCard">
    <div class="card-title">上傳圖片</div>
    <div class="upload-zone" id="uploadZone">
      <div class="icon">&#x1F5BC;</div>
      <p>拖曳圖片到此處，或點擊選擇檔案</p>
      <p class="hint">支援 PNG / JPEG / WebP，也可以 Ctrl+V 貼上</p>
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">
    </div>
  </div>

  <!-- Options -->
  <div class="card hidden" id="optionsCard">
    <div class="card-title">處理選項</div>

    <div class="info-bar" id="origInfo">
      <div class="item"><span class="label">尺寸</span><span id="origDim"></span></div>
      <div class="item"><span class="label">大小</span><span id="origSize"></span></div>
      <div class="item"><span class="label">格式</span><span id="origFmt"></span></div>
    </div>

    <div id="resizeNotice" class="notice notice-blue"></div>

    <div class="slider-group hidden" id="cropSliderWrap">
      <div class="slider-label">
        <span id="cropLabel">位置調整</span>
        <span id="cropValue">50%</span>
      </div>
      <input type="range" id="cropSlider" min="0" max="100" value="50" oninput="onCropSlide(this.value)">
    </div>

    <div class="chk-row">
      <input type="checkbox" id="chkLogo" onchange="onOptChange()">
      <label for="chkLogo">加入公司 LOGO（置中）</label>
    </div>

    <div class="options-row">
      <div class="opt-group">
        <label for="txtName">檔案名稱</label>
        <input type="text" id="txtName" placeholder="輸入檔案名稱">
      </div>
      <div class="opt-group">
        <label for="selFmt">輸出格式</label>
        <select id="selFmt" onchange="onOptChange()">
          <option value="original">保持原格式</option>
          <option value="image/webp">WebP</option>
          <option value="image/jpeg">JPEG</option>
          <option value="image/png">PNG</option>
        </select>
      </div>
    </div>

    <div id="pngWarn" class="notice notice-amber hidden">PNG 為無損格式，無法透過降低品質來壓縮檔案大小。若超過 150KB，建議選擇 WebP 或 JPEG。</div>
  </div>

  <!-- Preview -->
  <div class="card hidden" id="previewCard">
    <div class="card-title">預覽結果</div>
    <div class="preview-wrap" id="previewWrap">
      <canvas id="cvs"></canvas>
      <div class="processing-overlay hidden" id="loadingOverlay">處理中...</div>
    </div>
    <div class="preview-info" id="previewInfo">
      <span>尺寸：<span id="pvDim"></span></span>
      <span>大小：<span id="pvSize"></span></span>
      <span class="saved" id="pvSaved"></span>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="dlBtn" onclick="download()">下載圖片</button>
      <button class="btn btn-outline" onclick="reset()">處理另一張</button>
    </div>
  </div>
</div>

<script>
/* ───── State ───── */
let srcImg = null;   // original Image element
let srcFile = null;  // original File
let logoImg = null;  // logo Image element
let cropOff = 0.5;   // 0‒1, center default
let outBlob = null;  // processed blob
let busy = false;
let debounce = null;

const TARGET_W = 800, TARGET_H = 450;
const MAX_BYTES = 150 * 1024; // 150 KB

/* ───── Init ───── */
document.addEventListener('DOMContentLoaded', () => {
  loadLogo();
  initUpload();
  initPaste();
});

/* ───── Logo ───── */
function loadLogo() {
  const d = localStorage.getItem('_blog_logo');
  if (!d) return;
  const img = new Image();
  img.onload = () => { logoImg = img; refreshLogoUI(); };
  img.src = d;
}

function handleLogoUpload(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    localStorage.setItem('_blog_logo', e.target.result);
    const img = new Image();
    img.onload = () => { logoImg = img; refreshLogoUI(); if (srcImg) scheduleUpdate(); };
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}

function removeLogo() {
  localStorage.removeItem('_blog_logo');
  logoImg = null;
  refreshLogoUI();
  document.getElementById('chkLogo').checked = false;
  if (srcImg) scheduleUpdate();
}

function refreshLogoUI() {
  const thumb = document.getElementById('logoThumb');
  const badge = document.getElementById('logoBadge');
  const rmBtn = document.getElementById('logoRemoveBtn');
  const status = document.getElementById('logoStatus');
  if (logoImg) {
    thumb.innerHTML = '<img src="' + logoImg.src + '" alt="LOGO">';
    badge.textContent = '已設定';
    badge.style.background = '#dcfce7'; badge.style.color = '#15803d';
    rmBtn.classList.remove('hidden');
    status.textContent = '已儲存於瀏覽器，下次開啟自動載入';
  } else {
    thumb.innerHTML = '<div class="placeholder">LOGO</div>';
    badge.textContent = '未設定';
    badge.style.background = '#e0f2fe'; badge.style.color = '#0369a1';
    rmBtn.classList.add('hidden');
    status.textContent = '上傳 PNG 透明背景圖檔，僅需設定一次';
  }
}

/* ───── Upload ───── */
function initUpload() {
  const zone = document.getElementById('uploadZone');
  const inp = document.getElementById('fileInput');
  zone.addEventListener('click', () => inp.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadFile(f);
  });
  inp.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
}

function initPaste() {
  document.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const it of items) {
      if (it.type.startsWith('image/')) {
        e.preventDefault();
        const f = it.getAsFile();
        if (f) loadFile(f);
        return;
      }
    }
  });
}

function loadFile(file) {
  srcFile = file;
  const r = new FileReader();
  r.onload = e => {
    const img = new Image();
    img.onload = () => { srcImg = img; showOptions(); scheduleUpdate(); };
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}

/* ───── Options UI ───── */
function showOptions() {
  const w = srcImg.naturalWidth, h = srcImg.naturalHeight;

  // info
  document.getElementById('origDim').textContent = w + ' x ' + h + ' px';
  document.getElementById('origSize').textContent = fmtSize(srcFile.size);
  document.getElementById('origFmt').textContent = srcFile.type.split('/')[1].toUpperCase();

  // filename
  const raw = srcFile.name ? srcFile.name.replace(/\.[^.]+$/, '') : 'image_' + Date.now();
  document.getElementById('txtName').value = raw;

  // resize notice
  const notice = document.getElementById('resizeNotice');
  const sliderWrap = document.getElementById('cropSliderWrap');

  if (w >= TARGET_W) {
    notice.textContent = '原圖 ' + w + 'x' + h + ' → 等比縮放填滿 ' + TARGET_W + 'x' + TARGET_H;
    const targetR = TARGET_W / TARGET_H;
    const imgR = w / h;
    if (Math.abs(imgR - targetR) < 0.02) {
      sliderWrap.classList.add('hidden');
    } else {
      sliderWrap.classList.remove('hidden');
      document.getElementById('cropSlider').value = 50;
      cropOff = 0.5;
      document.getElementById('cropLabel').textContent =
        imgR > targetR ? '水平位置（左 ← → 右）' : '垂直位置（上 ← → 下）';
      document.getElementById('cropValue').textContent = '50%';
    }
  } else {
    notice.textContent = '原圖寬度 ' + w + 'px < ' + TARGET_W + 'px，僅壓縮不縮放';
    sliderWrap.classList.add('hidden');
  }

  document.getElementById('optionsCard').classList.remove('hidden');
}

/* ───── Events ───── */
function onCropSlide(v) {
  cropOff = v / 100;
  document.getElementById('cropValue').textContent = v + '%';
  scheduleUpdate();
}

function onOptChange() {
  // logo checkbox guard
  if (document.getElementById('chkLogo').checked && !logoImg) {
    alert('請先在上方「LOGO 設定」上傳 LOGO 圖檔');
    document.getElementById('chkLogo').checked = false;
    return;
  }
  // PNG warning
  const fmt = document.getElementById('selFmt').value;
  document.getElementById('pngWarn').classList.toggle('hidden', fmt !== 'image/png');
  scheduleUpdate();
}

function scheduleUpdate() {
  clearTimeout(debounce);
  debounce = setTimeout(render, 80);
}

/* ───── Core rendering ───── */
async function render() {
  if (!srcImg || busy) return;
  busy = true;

  const overlay = document.getElementById('loadingOverlay');
  const previewCard = document.getElementById('previewCard');
  previewCard.classList.remove('hidden');
  overlay.classList.remove('hidden');

  try {
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    const w = srcImg.naturalWidth, h = srcImg.naturalHeight;

    /* 1) Draw base image */
    if (w >= TARGET_W) {
      cvs.width = TARGET_W;
      cvs.height = TARGET_H;
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';

      const tR = TARGET_W / TARGET_H;
      const iR = w / h;

      let sx, sy, sw, sh;
      if (iR > tR) {
        // wider → crop width
        sh = h; sw = h * tR;
        sy = 0; sx = (w - sw) * cropOff;
      } else {
        // taller → crop height
        sw = w; sh = w / tR;
        sx = 0; sy = (h - sh) * cropOff;
      }
      ctx.drawImage(srcImg, sx, sy, sw, sh, 0, 0, TARGET_W, TARGET_H);
    } else {
      cvs.width = w;
      cvs.height = h;
      ctx.drawImage(srcImg, 0, 0);
    }

    /* 2) Logo overlay */
    if (document.getElementById('chkLogo').checked && logoImg) {
      const lw = logoImg.naturalWidth, lh = logoImg.naturalHeight;
      const scaleX = cvs.width / lw;
      const scaleY = cvs.height / lh;
      const sc = Math.min(scaleX, scaleY);
      const dw = lw * sc, dh = lh * sc;
      const dx = (cvs.width - dw) / 2;
      const dy = (cvs.height - dh) / 2;
      ctx.drawImage(logoImg, dx, dy, dw, dh);
    }

    /* 3) Compress */
    const fmt = getFormat();
    outBlob = await compress(cvs, fmt);

    /* 4) Update preview info */
    document.getElementById('pvDim').textContent = cvs.width + ' x ' + cvs.height + ' px';
    document.getElementById('pvSize').textContent = fmtSize(outBlob.size);

    const pct = ((1 - outBlob.size / srcFile.size) * 100);
    const savedEl = document.getElementById('pvSaved');
    if (pct > 0) {
      savedEl.textContent = '節省 ' + pct.toFixed(0) + '%';
      savedEl.style.color = '#16a34a';
    } else {
      savedEl.textContent = '大小增加 ' + Math.abs(pct).toFixed(0) + '%';
      savedEl.style.color = '#b45309';
    }

  } finally {
    overlay.classList.add('hidden');
    busy = false;
  }
}

/* ───── Compression ───── */
function getFormat() {
  const sel = document.getElementById('selFmt').value;
  return sel === 'original' ? (srcFile.type || 'image/jpeg') : sel;
}

function getExt(fmt) {
  return { 'image/jpeg': '.jpg', 'image/png': '.png', 'image/webp': '.webp' }[fmt] || '.jpg';
}

async function compress(cvs, fmt) {
  // PNG: no quality control
  if (fmt === 'image/png') return toBlobP(cvs, 'image/png');

  // Try high quality first
  let blob = await toBlobP(cvs, fmt, 0.92);
  if (blob.size <= MAX_BYTES) return blob;

  // Binary search
  let lo = 0.2, hi = 0.92, best = blob;
  for (let i = 0; i < 9; i++) {
    const mid = (lo + hi) / 2;
    blob = await toBlobP(cvs, fmt, mid);
    if (blob.size > MAX_BYTES) {
      hi = mid;
    } else {
      best = blob;
      lo = mid;
    }
  }
  return best.size <= MAX_BYTES ? best : blob;
}

function toBlobP(cvs, type, q) {
  return new Promise(res => cvs.toBlob(res, type, q));
}

/* ───── Download ───── */
function download() {
  if (!outBlob) return;
  const name = document.getElementById('txtName').value.trim() || 'image';
  const ext = getExt(getFormat());
  const url = URL.createObjectURL(outBlob);
  const a = document.createElement('a');
  a.href = url; a.download = name + ext;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ───── Reset ───── */
function reset() {
  srcImg = null; srcFile = null; outBlob = null; cropOff = 0.5;
  document.getElementById('optionsCard').classList.add('hidden');
  document.getElementById('previewCard').classList.add('hidden');
  document.getElementById('fileInput').value = '';
  document.getElementById('cropSlider').value = 50;
  document.getElementById('chkLogo').checked = false;
  document.getElementById('selFmt').value = 'original';
  document.getElementById('pngWarn').classList.add('hidden');
}

/* ───── Util ───── */
function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(2) + ' MB';
}
</script>
</body>
</html>
