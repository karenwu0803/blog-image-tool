<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圖片處理工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC","Microsoft JhengHei",sans-serif;
  background:#f5f6f8;color:#404040;min-height:100vh;padding:0;
}

/* ── Header Bar ── */
.top-bar{
  background:linear-gradient(135deg,#5ec4a8 0%,#17BFAB 50%,#4dbba5 100%);
  padding:14px 24px;display:flex;align-items:center;justify-content:center;gap:10px;
}
.top-bar h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:.5px}
.top-bar .sub{font-size:13px;color:rgba(255,255,255,.8);font-weight:400}

/* ── Layout ── */
.container{max-width:860px;margin:0 auto;padding:28px 20px 40px}

/* ── Card ── */
.card{
  background:#fff;border-radius:16px;padding:28px;margin-bottom:20px;
  border:1px solid #ececec;transition:box-shadow .2s;
}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.05)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-size:16px;font-weight:700;color:#404040;display:flex;align-items:center;gap:8px}
.badge{
  font-size:11px;font-weight:600;padding:3px 10px;border-radius:8px;
  background:#E9F9F0;color:#17BFAB;
}
.badge-done{background:#E9F9F0;color:#15803d}

/* ── Upload Zone ── */
.upload-zone{
  border:2px dashed #d4d4d4;border-radius:16px;padding:52px 24px;
  text-align:center;cursor:pointer;transition:all .25s;background:#fafafa;
}
.upload-zone:hover,.upload-zone.dragover{border-color:#17BFAB;background:#E9F9F0}
.upload-icon{width:56px;height:56px;margin:0 auto 14px;background:#E9F9F0;border-radius:50%;display:flex;align-items:center;justify-content:center}
.upload-icon svg{width:26px;height:26px;stroke:#17BFAB;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.upload-zone p{color:#404040;font-size:15px;font-weight:500;margin-bottom:6px}
.upload-zone .hint{font-size:13px;color:#999;font-weight:400}
.upload-zone input{display:none}

/* ── Logo Row ── */
.logo-row{
  display:flex;align-items:center;gap:18px;padding:16px 18px;
  background:#fafafa;border-radius:12px;border:1px solid #ececec;
}
.logo-row img{width:76px;height:auto;object-fit:contain;border-radius:8px;border:1px solid #ececec;background:#fff;padding:6px}
.logo-row .placeholder{
  width:76px;height:44px;display:flex;align-items:center;justify-content:center;
  border:2px dashed #d4d4d4;border-radius:8px;font-size:12px;color:#bbb;background:#fff;
}
.logo-row .logo-info{flex:1;display:flex;flex-direction:column;gap:6px}
.logo-row .logo-status{font-size:12px;color:#999}
.logo-row input{display:none}

/* ── Info Bar ── */
.info-bar{
  display:flex;gap:24px;flex-wrap:wrap;font-size:13px;color:#636363;
  padding:12px 16px;background:#fafafa;border-radius:10px;margin-bottom:16px;
  border:1px solid #ececec;
}
.info-bar .item{display:flex;align-items:center;gap:6px}
.info-bar .label{color:#999;font-weight:500;font-size:12px}

/* ── Notice ── */
.notice{font-size:13px;padding:11px 16px;border-radius:10px;margin-bottom:16px;font-weight:500}
.notice-teal{background:#E9F9F0;color:#0e9a87}
.notice-amber{background:#fff8e6;color:#b45309;border:1px solid #fde68a}

/* ── Options ── */
.options-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.opt-group{flex:1;min-width:200px;display:flex;flex-direction:column;gap:6px}
.opt-group label{font-size:13px;font-weight:600;color:#404040}
.opt-group input[type=text],.opt-group select{
  padding:10px 14px;border:1px solid #d4d4d4;border-radius:10px;font-size:14px;
  outline:none;transition:all .2s;background:#fff;color:#404040;
}
.opt-group input[type=text]:focus,.opt-group select:focus{
  border-color:#17BFAB;box-shadow:0 0 0 3px rgba(23,191,171,.12);
}

/* ── Checkbox ── */
.chk-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.chk-row input[type=checkbox]{
  width:18px;height:18px;cursor:pointer;accent-color:#17BFAB;border-radius:4px;
}
.chk-row label{font-size:14px;cursor:pointer;color:#404040;font-weight:500}

/* ── Draggable Canvas ── */
.preview-wrap.can-drag{cursor:grab}
.preview-wrap.can-drag:active{cursor:grabbing}
.crop-hint{text-align:center;font-size:12px;color:#17BFAB;margin:8px 0 0;font-weight:500}

/* ── Preview ── */
.preview-wrap{text-align:center;position:relative}
.preview-wrap canvas{
  max-width:100%;border-radius:12px;border:1px solid #ececec;
  display:block;margin:0 auto;
}
.preview-info{
  display:flex;justify-content:center;gap:24px;margin-top:14px;
  font-size:13px;color:#636363;font-weight:500;
}
.preview-info .saved{color:#17BFAB;font-weight:700}
.preview-info .warn{color:#b45309;font-weight:700}

/* ── Buttons ── */
.btn{
  padding:10px 24px;border:none;border-radius:10px;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;
}
.btn-download{
  background:#F9D122;color:#404040;font-size:15px;padding:12px 32px;
  box-shadow:0 2px 8px rgba(249,209,34,.3);
}
.btn-download:hover{background:#f0c800;box-shadow:0 4px 12px rgba(249,209,34,.4)}
.btn-teal{background:#17BFAB;color:#fff}
.btn-teal:hover{background:#0ea998}
.btn-outline{background:#fff;color:#636363;border:1px solid #d4d4d4}
.btn-outline:hover{background:#fafafa;border-color:#bbb}
.btn-sm{padding:7px 16px;font-size:13px}
.btn-danger-text{background:none;border:none;color:#e74c3c;font-size:12px;cursor:pointer;padding:2px 8px;font-weight:500}
.btn-danger-text:hover{text-decoration:underline}
.actions{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}

/* ── Divider ── */
.divider{height:1px;background:#ececec;margin:18px 0}

/* ── Hidden ── */
.hidden{display:none!important}

/* ── Responsive ── */
@media(max-width:600px){
  .container{padding:16px 12px 32px}
  .card{padding:20px 16px}
  .options-row{flex-direction:column}
  .opt-group{min-width:0}
  .top-bar h1{font-size:16px}
}
</style>
</head>
<body>

<!-- Header -->
<div class="top-bar">
  <h1>圖片處理工具</h1>
  <span class="sub">Blog Image Tool</span>
</div>

<div class="container">

  <!-- LOGO Setup -->
  <div class="card" id="logoCard">
    <div class="card-header">
      <div class="card-title">LOGO 設定</div>
      <span class="badge" id="logoBadge">未設定</span>
    </div>
    <div class="logo-row">
      <div id="logoThumb"><div class="placeholder">LOGO</div></div>
      <div class="logo-info">
        <div>
          <button class="btn btn-outline btn-sm" id="logoUploadBtn">上傳 LOGO</button>
          <button class="btn-danger-text hidden" id="logoRemoveBtn">移除</button>
        </div>
        <span class="logo-status" id="logoStatus">上傳 PNG 透明背景圖檔，僅需設定一次</span>
      </div>
      <input type="file" id="logoInput" accept="image/png,image/webp,image/gif">
    </div>
  </div>

  <!-- Upload -->
  <div class="card" id="uploadCard">
    <div class="card-header">
      <div class="card-title">上傳圖片</div>
    </div>
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <p>拖曳圖片到此處，或點擊選擇檔案</p>
      <p class="hint">支援 PNG / JPEG / WebP，也可以 Ctrl+V 貼上</p>
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">
    </div>
  </div>

  <!-- Options -->
  <div class="card hidden" id="optionsCard">
    <div class="card-header">
      <div class="card-title">處理選項</div>
    </div>

    <div class="info-bar" id="origInfo">
      <div class="item"><span class="label">尺寸</span><span id="origDim"></span></div>
      <div class="item"><span class="label">大小</span><span id="origSize"></span></div>
      <div class="item"><span class="label">格式</span><span id="origFmt"></span></div>
    </div>

    <div id="resizeNotice" class="notice notice-teal"></div>

    <div class="divider"></div>

    <div class="chk-row">
      <input type="checkbox" id="chkSharpen" checked>
      <label for="chkSharpen">縮圖銳化（讓縮放後的圖片更清晰）</label>
    </div>

    <div class="chk-row">
      <input type="checkbox" id="chkLogo">
      <label for="chkLogo">加入公司 LOGO（置中）</label>
    </div>

    <div class="divider"></div>

    <div class="options-row">
      <div class="opt-group">
        <label for="txtName">檔案名稱</label>
        <input type="text" id="txtName" placeholder="輸入檔案名稱">
      </div>
      <div class="opt-group">
        <label for="selFmt">輸出格式</label>
        <select id="selFmt">
          <option value="original">保持原格式</option>
          <option value="image/webp">WebP</option>
          <option value="image/jpeg">JPEG</option>
          <option value="image/png">PNG</option>
        </select>
      </div>
    </div>

    <div id="pngWarn" class="notice notice-amber hidden">PNG 為無損格式，無法透過降低品質來壓縮檔案大小。若超過 150KB，建議選擇 WebP 或 JPEG。</div>
  </div>

  <!-- Preview -->
  <div class="card hidden" id="previewCard">
    <div class="card-header">
      <div class="card-title">預覽結果</div>
    </div>
    <div class="preview-wrap" id="previewWrap">
      <canvas id="cvs"></canvas>
    </div>
    <p class="crop-hint hidden" id="cropHint"></p>
    <div class="preview-info" id="previewInfo">
      <span>尺寸：<span id="pvDim"></span></span>
      <span>大小：<span id="pvSize"></span></span>
      <span id="pvSaved"></span>
    </div>
    <div class="actions">
      <button class="btn btn-download" id="dlBtn">下載圖片</button>
      <button class="btn btn-outline" id="resetBtn">處理另一張</button>
    </div>
  </div>

</div>

<script>
(function() {
'use strict';

/* ───── Constants ───── */
var TARGET_W = 800, TARGET_H = 450;
var MAX_BYTES = 150 * 1024;
var MAX_FILE_SIZE = 20 * 1024 * 1024; // 20MB
var MAX_DIMENSION = 8192; // Canvas safe limit
var SHARPEN_STRENGTH = 0.4;

/* ───── State ───── */
var state = {
  srcImg: null,
  srcFile: null,
  logoImg: null,
  cropOff: 0.5,
  outBlob: null,
  busy: false,
  pendingRender: false,
  needsCrop: false,
  cropDir: null,
  isDragging: false,
  dragStart: 0,
  dragStartOff: 0
};

var debounceTimer = null;

/* ───── DOM Cache ───── */
var dom = {};
function cacheDom() {
  var ids = [
    'logoInput','logoUploadBtn','logoRemoveBtn','logoBadge','logoThumb','logoStatus',
    'uploadZone','fileInput',
    'optionsCard','origDim','origSize','origFmt','txtName','resizeNotice',
    'chkSharpen','chkLogo','selFmt','pngWarn',
    'previewCard','previewWrap','cvs','cropHint',
    'pvDim','pvSize','pvSaved',
    'dlBtn','resetBtn'
  ];
  ids.forEach(function(id) { dom[id] = document.getElementById(id); });
  dom.ctx = dom.cvs.getContext('2d');
}

/* ───── Init ───── */
document.addEventListener('DOMContentLoaded', function() {
  cacheDom();
  bindEvents();
  loadLogo();
});

function bindEvents() {
  // Logo
  dom.logoUploadBtn.addEventListener('click', function() { dom.logoInput.click(); });
  dom.logoInput.addEventListener('change', function() { handleLogoUpload(this.files[0]); });
  dom.logoRemoveBtn.addEventListener('click', removeLogo);

  // Upload
  dom.uploadZone.addEventListener('click', function() { dom.fileInput.click(); });
  dom.uploadZone.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('dragover'); });
  dom.uploadZone.addEventListener('dragleave', function() { this.classList.remove('dragover'); });
  dom.uploadZone.addEventListener('drop', function(e) {
    e.preventDefault(); this.classList.remove('dragover');
    var f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadFile(f);
  });
  dom.fileInput.addEventListener('change', function() { if (this.files[0]) loadFile(this.files[0]); });

  // Paste
  document.addEventListener('paste', function(e) {
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.startsWith('image/')) {
        e.preventDefault();
        var f = items[i].getAsFile();
        if (f) loadFile(f);
        return;
      }
    }
  });

  // Options
  dom.chkSharpen.addEventListener('change', onOptChange);
  dom.chkLogo.addEventListener('change', onOptChange);
  dom.selFmt.addEventListener('change', onOptChange);

  // Canvas drag (bind once)
  dom.previewWrap.addEventListener('mousedown', canvasDragStart);
  dom.previewWrap.addEventListener('touchstart', canvasDragStart);

  // Actions
  dom.dlBtn.addEventListener('click', download);
  dom.resetBtn.addEventListener('click', reset);
}

/* ───── Logo ───── */
function loadLogo() {
  var d;
  try { d = localStorage.getItem('_blog_logo'); } catch(e) { return; }
  if (!d) return;
  var img = new Image();
  img.onload = function() { state.logoImg = img; refreshLogoUI(); };
  img.onerror = function() { try { localStorage.removeItem('_blog_logo'); } catch(e) {} };
  img.src = d;
}

function handleLogoUpload(file) {
  if (!file) return;
  var r = new FileReader();
  r.onerror = function() { alert('LOGO 讀取失敗，請重試'); };
  r.onload = function(e) {
    try {
      localStorage.setItem('_blog_logo', e.target.result);
    } catch(err) {
      alert('LOGO 檔案太大，無法儲存至瀏覽器。請使用較小的 PNG 檔案。');
      return;
    }
    var img = new Image();
    img.onload = function() {
      state.logoImg = img;
      refreshLogoUI();
      if (state.srcImg) scheduleUpdate();
    };
    img.onerror = function() { alert('LOGO 圖片格式無法讀取'); };
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}

function removeLogo() {
  try { localStorage.removeItem('_blog_logo'); } catch(e) {}
  state.logoImg = null;
  refreshLogoUI();
  dom.chkLogo.checked = false;
  if (state.srcImg) scheduleUpdate();
}

function refreshLogoUI() {
  var thumb = dom.logoThumb;
  // Fix #1: 不用 innerHTML 拼接，改用 createElement
  thumb.textContent = '';
  if (state.logoImg) {
    var img = document.createElement('img');
    img.src = state.logoImg.src;
    img.alt = 'LOGO';
    thumb.appendChild(img);
    dom.logoBadge.textContent = '已設定';
    dom.logoBadge.className = 'badge badge-done';
    dom.logoRemoveBtn.classList.remove('hidden');
    dom.logoStatus.textContent = '已儲存於瀏覽器，下次開啟自動載入';
  } else {
    var placeholder = document.createElement('div');
    placeholder.className = 'placeholder';
    placeholder.textContent = 'LOGO';
    thumb.appendChild(placeholder);
    dom.logoBadge.textContent = '未設定';
    dom.logoBadge.className = 'badge';
    dom.logoRemoveBtn.classList.add('hidden');
    dom.logoStatus.textContent = '上傳 PNG 透明背景圖檔，僅需設定一次';
  }
}

/* ───── Upload ───── */
function loadFile(file) {
  // Fix #3: 輸入驗證
  if (file.size > MAX_FILE_SIZE) {
    alert('檔案大小超過 20MB，請選擇較小的圖片');
    return;
  }
  state.srcFile = file;
  var r = new FileReader();
  r.onerror = function() { alert('圖片讀取失敗，請重試'); };
  r.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      if (img.naturalWidth > MAX_DIMENSION || img.naturalHeight > MAX_DIMENSION) {
        alert('圖片尺寸超過 ' + MAX_DIMENSION + 'px，可能無法正常處理');
      }
      state.srcImg = img;
      showOptions();
      scheduleUpdate();
    };
    img.onerror = function() { alert('無法載入此圖片，請確認格式是否正確'); };
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}

/* ───── Options UI ───── */
function showOptions() {
  var w = state.srcImg.naturalWidth, h = state.srcImg.naturalHeight;

  dom.origDim.textContent = w + ' x ' + h + ' px';
  dom.origSize.textContent = fmtSize(state.srcFile.size);
  dom.origFmt.textContent = state.srcFile.type.split('/')[1].toUpperCase();

  var raw = state.srcFile.name ? state.srcFile.name.replace(/\.[^.]+$/, '') : 'image_' + Date.now();
  dom.txtName.value = raw;

  if (w >= TARGET_W) {
    dom.resizeNotice.textContent = '原圖 ' + w + ' x ' + h + ' → 等比縮放填滿 ' + TARGET_W + ' x ' + TARGET_H;
    var targetR = TARGET_W / TARGET_H;
    var imgR = w / h;
    if (Math.abs(imgR - targetR) < 0.02) {
      state.needsCrop = false;
    } else {
      state.needsCrop = true;
      state.cropOff = 0.5;
      state.cropDir = imgR > targetR ? 'x' : 'y';
      dom.cropHint.textContent =
        state.cropDir === 'x' ? '← 拖曳預覽圖片調整水平位置 →' : '↑ 拖曳預覽圖片調整垂直位置 ↓';
    }
  } else {
    dom.resizeNotice.textContent = '原圖寬度 ' + w + 'px < ' + TARGET_W + 'px，僅壓縮不縮放';
    state.needsCrop = false;
  }

  dom.optionsCard.classList.remove('hidden');
}

/* ───── Canvas Drag (crop) ───── */
function canvasDragStart(e) {
  if (!state.needsCrop) return;
  e.preventDefault();
  state.isDragging = true;
  var p = ptrPos(e);
  state.dragStart = state.cropDir === 'y' ? p.y : p.x;
  state.dragStartOff = state.cropOff;
  document.addEventListener('mousemove', canvasDragMove);
  document.addEventListener('mouseup', canvasDragEnd);
  document.addEventListener('touchmove', canvasDragMove, {passive:false});
  document.addEventListener('touchend', canvasDragEnd);
}

function canvasDragMove(e) {
  if (!state.isDragging) return;
  e.preventDefault();
  var p = ptrPos(e);
  var cur = state.cropDir === 'y' ? p.y : p.x;
  var rect = dom.cvs.getBoundingClientRect();
  var visibleSize = state.cropDir === 'y' ? rect.height : rect.width;
  var delta = state.dragStart - cur;
  state.cropOff = Math.max(0, Math.min(1, state.dragStartOff + delta / visibleSize));
  // Fix #4: 拖曳中跳過銳化（傳 true）
  drawCanvas(true);
  state.dragStart = cur;
  state.dragStartOff = state.cropOff;
}

function canvasDragEnd() {
  state.isDragging = false;
  document.removeEventListener('mousemove', canvasDragMove);
  document.removeEventListener('mouseup', canvasDragEnd);
  document.removeEventListener('touchmove', canvasDragMove);
  document.removeEventListener('touchend', canvasDragEnd);
  scheduleUpdate();
}

function ptrPos(e) {
  if (e.touches && e.touches.length) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
  return {x:e.clientX, y:e.clientY};
}

/* ───── Events ───── */
function onOptChange() {
  if (dom.chkLogo.checked && !state.logoImg) {
    alert('請先在上方「LOGO 設定」上傳 LOGO 圖檔');
    dom.chkLogo.checked = false;
    return;
  }
  var fmt = dom.selFmt.value;
  dom.pngWarn.classList.toggle('hidden', fmt !== 'image/png');
  scheduleUpdate();
}

function scheduleUpdate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 80);
}

/* ───── Drawing (fast, for drag) ───── */
function drawCanvas(skipSharpen) {
  if (!state.srcImg) return;
  var w = state.srcImg.naturalWidth, h = state.srcImg.naturalHeight;

  if (w >= TARGET_W) {
    dom.cvs.width = TARGET_W;
    dom.cvs.height = TARGET_H;
    dom.ctx.imageSmoothingEnabled = true;
    dom.ctx.imageSmoothingQuality = 'high';
    var tR = TARGET_W / TARGET_H;
    var iR = w / h;
    var sx, sy, sw, sh;
    if (iR > tR) {
      sh = h; sw = h * tR; sy = 0; sx = (w - sw) * state.cropOff;
    } else {
      sw = w; sh = w / tR; sx = 0; sy = (h - sh) * state.cropOff;
    }
    dom.ctx.drawImage(state.srcImg, sx, sy, sw, sh, 0, 0, TARGET_W, TARGET_H);
  } else {
    dom.cvs.width = w; dom.cvs.height = h;
    dom.ctx.drawImage(state.srcImg, 0, 0);
  }

  // Fix #4: 拖曳中不跑銳化
  if (!skipSharpen && dom.chkSharpen.checked && w >= TARGET_W) {
    applySharpen(dom.ctx, dom.cvs.width, dom.cvs.height, SHARPEN_STRENGTH);
  }

  if (dom.chkLogo.checked && state.logoImg) {
    var lw = state.logoImg.naturalWidth, lh = state.logoImg.naturalHeight;
    var sc = Math.min(dom.cvs.width / lw, dom.cvs.height / lh);
    var dw = lw * sc, dh = lh * sc;
    dom.ctx.drawImage(state.logoImg, (dom.cvs.width - dw) / 2, (dom.cvs.height - dh) / 2, dw, dh);
  }
}

/* ───── Full render (draw + compress) ───── */
async function render() {
  if (!state.srcImg) return;
  // Fix #5: busy 時不丟棄，標記 pending，完成後重跑
  if (state.busy) { state.pendingRender = true; return; }
  state.busy = true;

  dom.previewCard.classList.remove('hidden');
  dom.previewWrap.classList.toggle('can-drag', state.needsCrop);
  dom.cropHint.classList.toggle('hidden', !state.needsCrop);

  drawCanvas(false);

  try {
    var fmt = getFormat();
    var blob = await compress(dom.cvs, fmt);
    if (!blob) {
      alert('圖片壓縮失敗，請嘗試其他輸出格式');
      return;
    }
    state.outBlob = blob;

    dom.pvDim.textContent = dom.cvs.width + ' x ' + dom.cvs.height + ' px';
    dom.pvSize.textContent = fmtSize(blob.size);

    var pct = ((1 - blob.size / state.srcFile.size) * 100);
    if (pct > 0) {
      dom.pvSaved.textContent = '節省 ' + pct.toFixed(0) + '%';
      dom.pvSaved.className = 'saved';
    } else {
      dom.pvSaved.textContent = '大小增加 ' + Math.abs(pct).toFixed(0) + '%';
      dom.pvSaved.className = 'warn';
    }
  } finally {
    state.busy = false;
    // Fix #5: 有 pending 請求就重跑
    if (state.pendingRender) {
      state.pendingRender = false;
      scheduleUpdate();
    }
  }
}

/* ───── Sharpen ───── */
function applySharpen(ctx, w, h, strength) {
  var src = ctx.getImageData(0, 0, w, h);
  var dst = ctx.createImageData(w, h);
  var s = src.data, d = dst.data;

  for (var y = 0; y < h; y++) {
    for (var x = 0; x < w; x++) {
      var i = (y * w + x) * 4;

      if (y === 0 || y === h - 1 || x === 0 || x === w - 1) {
        d[i] = s[i]; d[i+1] = s[i+1]; d[i+2] = s[i+2]; d[i+3] = s[i+3];
        continue;
      }

      for (var c = 0; c < 3; c++) {
        var center = s[i + c];
        var neighbors =
          s[((y-1)*w+x)*4+c] +
          s[((y+1)*w+x)*4+c] +
          s[(y*w+x-1)*4+c] +
          s[(y*w+x+1)*4+c];
        var diff = center - neighbors / 4;
        var val = center + strength * diff;
        d[i + c] = val < 0 ? 0 : val > 255 ? 255 : (val + 0.5) | 0;
      }
      d[i+3] = s[i+3];
    }
  }

  ctx.putImageData(dst, 0, 0);
}

/* ───── Compression ───── */
function getFormat() {
  var sel = dom.selFmt.value;
  return sel === 'original' ? (state.srcFile.type || 'image/jpeg') : sel;
}

function getExt(fmt) {
  return { 'image/jpeg': '.jpg', 'image/png': '.png', 'image/webp': '.webp' }[fmt] || '.jpg';
}

async function compress(cvs, fmt) {
  if (fmt === 'image/png') return toBlobP(cvs, 'image/png');

  var blob = await toBlobP(cvs, fmt, 0.92);
  if (!blob) return null;
  if (blob.size <= MAX_BYTES) return blob;

  var lo = 0.2, hi = 0.92, best = blob;
  for (var i = 0; i < 9; i++) {
    var mid = (lo + hi) / 2;
    blob = await toBlobP(cvs, fmt, mid);
    if (!blob) return best;
    if (blob.size > MAX_BYTES) {
      hi = mid;
    } else {
      best = blob;
      lo = mid;
    }
  }
  return best.size <= MAX_BYTES ? best : blob;
}

function toBlobP(cvs, type, q) {
  return new Promise(function(res) { cvs.toBlob(function(b) { res(b); }, type, q); });
}

/* ───── Download ───── */
function download() {
  if (!state.outBlob) return;
  var name = dom.txtName.value.trim() || 'image';
  var ext = getExt(getFormat());
  var url = URL.createObjectURL(state.outBlob);
  var a = document.createElement('a');
  a.href = url; a.download = name + ext;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ───── Reset ───── */
function reset() {
  state.srcImg = null;
  state.srcFile = null;
  state.outBlob = null;
  state.cropOff = 0.5;
  state.needsCrop = false;
  dom.optionsCard.classList.add('hidden');
  dom.previewCard.classList.add('hidden');
  dom.cropHint.classList.add('hidden');
  dom.previewWrap.classList.remove('can-drag');
  dom.fileInput.value = '';
  dom.chkSharpen.checked = true;
  dom.chkLogo.checked = false;
  dom.selFmt.value = 'original';
  dom.pngWarn.classList.add('hidden');
}

/* ───── Util ───── */
function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(2) + ' MB';
}

})();
</script>
